# Runs the same safety checks as local `npm run check` on every push / PR.
name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install MCP dependencies
        run: npm ci --prefix packages/ic2-mcp

      - name: Typecheck and unit tests
        run: npm run check:all
